<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document to Firebase Storage</title>
    <script type="module">
        // Your web app's Firebase configuration
        const firebaseConfig = {
  apiKey: "AIzaSyBr1VpHdmMZMkXQEIGp55N5JGVgYbhpyqY",
  authDomain: "medicinereminder-d0711.firebaseapp.com",
  databaseURL: "https://medicinereminder-d0711-default-rtdb.firebaseio.com",
  projectId: "medicinereminder-d0711",
  storageBucket: "medicinereminder-d0711.appspot.com",
  messagingSenderId: "516386930818",
  appId: "1:516386930818:web:3d4d409673a9b4ec0bf49b"
};

        // Import Firebase libraries
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        document.addEventListener('DOMContentLoaded', () => {
            const uploadButton = document.getElementById('uploadButton');
            const fileInput = document.getElementById('fileInput');

            uploadButton.addEventListener('click', () => {
                const file = fileInput.files[0];

                if (file) {
                    const storageRef = ref(storage, 'documents/' + file.name);
                    uploadBytes(storageRef, file).then((snapshot) => {
                        console.log('Uploaded a blob or file!', snapshot);
                        getDownloadURL(snapshot.ref).then((downloadURL) => {
                            console.log('File available at', downloadURL);
                            alert('Upload successful!' );
                        });
                    }).catch((error) => {
                        console.error('Upload failed:', error);
                    });
                } else {
                    alert('Please select a file to upload.');
                }
            });
        });
    </script>
</head>
<body>
    <h2>Microplastic Detection Using Hologram</h2>
    <div style="padding-top: 30px;">
        <input type="file" id="fileInput" />
        <button id="uploadButton">Upload</button>
    </div>
   
</body>
</html>
