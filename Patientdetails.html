      // Function to add new medicine input row in the view patient modal
      function addNewMedicineRow() {
    const newMedicineRow = `
      <tr class="new-medicine-row">
        <td><input type="text" class="form-control new-medicine-name" required></td>
        <td><input type="time" class="form-control new-medicine-time" required></td>
        <td><input type="number" class="form-control new-medicine-intake" value="0" required></td>
        <td><input type="number" class="form-control new-medicine-count" value="0" required></td>
        <td>
          <label class="checkbox-inline">
            <input type="checkbox" class="new-intake-type" value="Before Food"> Before Food
          </label>
          <label class="checkbox-inline">
            <input type="checkbox" class="new-intake-type" value="After Food"> After Food
          </label>
        </td>
        <td>
          <button class="btn btn-success btn-save-new-medicine">Save</button>
        </td>
      </tr>
    `;
    
    $('#viewMedicineTable tbody').append(newMedicineRow);

    // Get references to the last added row's input fields
    const newRow = $('#viewMedicineTable tbody').find('.new-medicine-row').last();
    const nameField = newRow.find('.new-medicine-name');
    const timeField = newRow.find('.new-medicine-time');
    const intakeField = newRow.find('.new-medicine-intake');
    const countField = newRow.find('.new-medicine-count');
    const intakeTypeFields = newRow.find('.new-intake-type');

    // Store the initial count
    let initialCount = parseInt(countField.val()) || 0;

    // Event listener to update count based on intake
    intakeField.on('input', function () {
        let newIntake = parseInt($(this).val()) || 0;
        newIntake = Math.max(newIntake, 0); // Prevent negative intake values

        const newCount = initialCount - newIntake;
        countField.val(newCount >= 0 ? newCount : 0); // Ensure count doesn't go below 0

        // Disable intake if count reaches 0
        if (newCount <= 0) {
            intakeField.prop('disabled', true);
        } else {
            intakeField.prop('disabled', false);
        }
    });

    // Optional: Update the initial count if the count field is changed
    countField.on('input', function () {
        initialCount = parseInt($(this).val()) || 0;
        if (initialCount <= 0) {
            intakeField.val(0).prop('disabled', true);
        } else {
            intakeField.prop('disabled', false);
        }
    });

   
}

function viewPatientData(key) {
    const patientRef = ref(db, key);
    onValue(patientRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            $('#viewPatientName').text(key.replace(/.*\/Patients\//, '').replace(/\/Medicines$/, ''));
            $('#viewPatientEmail').text(data.email || 'No email available'); // Use 'email' field

            const tbody = $('#viewMedicineTable tbody');
            tbody.empty();

            // Check if Medicines exist and iterate properly
            if (data.Medicines) {
                Object.keys(data.Medicines).forEach((medicineKey) => {
                    const medicine = data.Medicines[medicineKey];
                    const intakeTypesText = medicine.IntakeType ? medicine.IntakeType.join(', ') : '';
                    const row = `
                        <tr>
                            <td>${medicine.MedicineName}</td>
                            <td>${medicine.Time}</td>
                            <td>${medicine.Intake}</td>
                            <td>${medicine.Count}</td>
                            <td>${intakeTypesText}</td>
                            <td>
                                <button class="btn btn-warning btn-edit-medicine" data-key="${medicineKey}" data-patient="${key}">Edit</button>
                                <button class="btn btn-danger btn-delete-medicine" data-key="${medicineKey}" data-patient="${key}">Delete</button>
                            </td>
                        </tr>
                    `;
                    tbody.append(row);
                });
            } else {
                tbody.append('<tr><td colspan="6">No medicines found.</td></tr>');
            }

            $('#viewPatientModal').modal('show');
        } else {
            alert('No data found for this patient.');
        }
    });
}

      function saveEditedMedicine(patientKey, index) {
        const medicineName = $('#editMedicineName').val();
        const time = $('#editTime').val();
        const intake = $('#editIntake').val();
        const count = $('#editCount').val();

        const intakeTypes = [];
        $('.intake-type:checked').each(function () {
          intakeTypes.push($(this).val());
        });

        if (medicineName && time && intake && count && intakeTypes.length > 0) {
          const patientRef = ref(db, patientKey);
          get(patientRef).then((snapshot) => {
            const data = snapshot.val();
            if (data && data.Medicines && data.Medicines.length > index) {
              data.Medicines[index] = {
                MedicineName: medicineName,
                Time: time,
                Intake: intake,
                Count: count,
                IntakeType: intakeTypes
              };

              update(patientRef, { Medicines: data.Medicines })
                .then(() => {
                  alert('Medicine updated successfully!');
                  $('#editMedicineModal').modal('hide');
                  viewPatientData(patientKey);
                })
                .catch((error) => {
                  console.error('Error updating medicine:', error);
                  alert('Error updating medicine.');
                });
            }
          });
        } else {
          alert('Please fill in all the details.');
        }
      }

// Function to convert image file to base64 string
function convertImageToBase64(file, callback) {
    if (!file.type.startsWith("image/")) {
        alert("Only image files are allowed.");
        return;
    }

    const reader = new FileReader();
    reader.onloadend = function () {
        const base64String = reader.result.split(",")[1]; // Remove the data URL prefix
        callback(base64String);
    };

    reader.readAsDataURL(file);
}

// Function to convert image to Base64 and upload to Firestore
async function uploadImageAsBase64ToFirestore(file, userId, metadataCollection) {
    if (!file.type.startsWith("image/")) {
        alert("Only image files are allowed.");
        return;
    }

    const reader = new FileReader();

    reader.onloadend = async function () {
        const base64String = reader.result.split(",")[1]; // Remove data URL prefix

        try {
            // Firestore document reference
            const docRef = doc(db, metadataCollection, `${userId}_${Date.now()}`);

            // Save metadata and Base64 string to Firestore
            await setDoc(docRef, {
                fileName: file.name,
                base64: base64String, // Store the Base64 string
                uploadTime: new Date().toISOString(),
                userId: userId
            });

            alert("Image uploaded successfully!");
        } catch (error) {
            console.error("Error uploading image to Firestore:", error);
            alert("Failed to upload image. Please try again.");
        }
    };

    reader.readAsDataURL(file); // Start reading the file
}

        return;
    }

    if (!file.type.startsWith("image/")) {
        alert("Only image files are allowed.");
        return;
    }

    // Extract patient name from the path
    const patientName = patientPath.split("/").pop();

    try {
        // 🔹 Fetch patient email from Firebase Realtime Database
        const patientRef = ref(db, `Admin/${loggedInAdminKey}/Patients/${patientName}/email`);
        const patientEmailSnapshot = await get(patientRef);
        const patientEmail = patientEmailSnapshot.exists() ? patientEmailSnapshot.val() : "No email found";

        console.log("🟢 Patient Email Found:", patientEmail);

        const reader = new FileReader();
        reader.onloadend = async function () {
            const base64String = reader.result.split(",")[1]; // Remove the data URL prefix

            // Firestore document reference
            const documentId = `${patientPath.replace(/\//g, "_")}_${Date.now()}`;
            const docRef = doc(database, "PatientImages", documentId);

            // Save the image with email in Firestore
            await setDoc(docRef, {
                patientPath: patientPath,
                fileName: file.name,
                fileType: file.type,
                imageContent: base64String, // Store Base64 string
                uploadedAt: new Date().toISOString(),
                email: patientEmail // 🔹 Save patient's email
            });

            alert("Image uploaded successfully!");
            document.getElementById("uploadDocumentForm").reset();
            document.getElementById("statusMessage").textContent = "Upload successful!";
        };

        reader.readAsDataURL(file); // Read file as Base64
    } catch (error) {
        console.error("🚨 ERROR Uploading Image:", error);
        alert(`Failed to upload image. Error: ${error.message}`);
    }
}

function checkAndUpdateAlarm() {
    const loggedInAdminKey = localStorage.getItem('loggedInAdminKey');
    if (!loggedInAdminKey) {
        console.error('Admin not logged in. Cannot check alarms.');
        return;
    }

    const patientsRef = ref(db, `Admin/${loggedInAdminKey}/Patients`);
    const currentTime = new Date().toLocaleTimeString('en-US', {
        hour12: false, // 24-hour format
        hour: '2-digit',
        minute: '2-digit',
    });

    onValue(patientsRef, (snapshot) => {
        const patients = snapshot.val();
        if (patients) {
            Object.keys(patients).forEach((patientKey) => {
                const patient = patients[patientKey];
                const medicines = patient.Medicines || {}; // Default to an empty object

                let alarmTriggered = 0;

                // Loop through medicines (handle object structure)
                Object.keys(medicines).forEach((medicineKey) => {
                    const medicine = medicines[medicineKey];
                    if (medicine.Time === currentTime) {
                        alarmTriggered = 1;
                    }
                });

                const patientRef = ref(db, `Admin/${loggedInAdminKey}/Patients/${patientKey}`);
                if (alarmTriggered) {
                    update(patientRef, { Alarm: 1 })
                        .then(() => console.log(`Alarm set to true for patient: ${patientKey}`))
                        .catch((error) => console.error(`Error updating alarm for ${patientKey}:`, error));
                } else {
                    update(patientRef, { Alarm: 0 })
                        .then(() => console.log(`Alarm set to false for patient: ${patientKey}`))
                        .catch((error) => console.error(`Error resetting alarm for ${patientKey}:`, error));
                }
            });
        }
    }, {
        onlyOnce: true,
    });
}

// Schedule the check to run every minute
setInterval(checkAndUpdateAlarm, 60000);




function monitorAlarmStatusAndUpdateCount() {
  const loggedInAdminKey = localStorage.getItem('loggedInAdminKey');
  if (!loggedInAdminKey) {
    console.error('Admin not logged in. Cannot monitor AlarmStatus.');
    return;
  }

  const patientsRef = ref(db, `Admin/${loggedInAdminKey}/Patients`);

  // Listen for changes in patients
  onValue(patientsRef, (snapshot) => {
    const patients = snapshot.val();
    if (patients) {
      Object.keys(patients).forEach((patientKey) => {
        const patient = patients[patientKey];

        // Check if AlarmStatus is true
        if (patient.AlarmStatus === true) {
          const medicinesRef = ref(db, `Admin/${loggedInAdminKey}/Patients/${patientKey}/Medicines`);
          
          // Get medicines for the patient
          get(medicinesRef).then((medicineSnapshot) => {
            const medicines = medicineSnapshot.val();
            if (medicines) {
              Object.keys(medicines).forEach((medicineKey) => {
                const medicine = medicines[medicineKey];

                // Decrement count by 1 if count > 0
                if (medicine.Count > 0) {
                  const updatedCount = medicine.Count - 1;

                  // Update the count in the database
                  update(ref(db, `Admin/${loggedInAdminKey}/Patients/${patientKey}/Medicines/${medicineKey}`), {
                    Count: updatedCount,
                  })
                    .then(() => console.log(`Count decremented for medicine: ${medicine.MedicineName}, new count: ${updatedCount}`))
                    .catch((error) => console.error('Error updating medicine count:', error));
                }
              });
            }
          });

          // Reset AlarmStatus to false after processing
          update(ref(db, `Admin/${loggedInAdminKey}/Patients/${patientKey}`), { AlarmStatus: false })
            .then(() => console.log(`AlarmStatus reset for patient: ${patientKey}`))
            .catch((error) => console.error('Error resetting AlarmStatus:', error));
        }
      });
    }
  });
}

monitorAlarmStatusAndUpdateCount();

function monitorUnresponsivePatients() {
    const loggedInAdminKey = localStorage.getItem("loggedInAdminKey");

    if (!loggedInAdminKey) {
        console.error("Admin not logged in. Cannot monitor Alarmstatus.");
        return;
    }

    console.log(`Monitoring unresponsive patients for Admin: ${loggedInAdminKey}`);

    const patientsRef = ref(db, `Admin/${loggedInAdminKey}/Patients`);

    // Listen for real-time changes in all patients
    onValue(patientsRef, (snapshot) => {
        const patients = snapshot.val();
        if (!patients) return;

        Object.entries(patients).forEach(([patientKey, patientData]) => {
            if (patientData.Alarm === 1) {
                const medicinesRef = ref(db, `Admin/${loggedInAdminKey}/Patients/${patientKey}/Medicines`);

                // Save initial count snapshot
                get(medicinesRef).then((initialSnap) => {
                    const initialCounts = {};
                    const initialData = initialSnap.val();

                    if (!initialData) return;

                    Object.entries(initialData).forEach(([medKey, medVal]) => {
                        initialCounts[medKey] = medVal.Count || 0;
                    });

                    // Wait 30 seconds before re-check
                    setTimeout(() => {
                        get(medicinesRef).then((finalSnap) => {
                            const finalData = finalSnap.val();
                            let countChanged = false;

                            Object.entries(finalData || {}).forEach(([medKey, medVal]) => {
                                const newCount = medVal.Count || 0;
                                if (newCount < (initialCounts[medKey] || 0)) {
                                    countChanged = true;
                                }
                            });

                            // If no medicine count was reduced, trigger notrespond
                            if (!countChanged) {
                                const alarmStatusRef = ref(db, `Admin/${loggedInAdminKey}/Alarmstatus`);
                                set(alarmStatusRef, "notrespond").then(() => {
                                    showNotification(`⚠️ Patient ${patientKey} is not responding to the Alarm`);
                                    console.warn(`Alarmstatus set to 'notrespond' for patient ${patientKey}`);
                                });
                            }
                        });
                    }, 40000); // 60 seconds
                });
            }
        });
    });
}





// Function to show a notification
function showNotification(message) {
    const list = document.getElementById("notificationList");
    const count = document.getElementById("notificationCount");

    const item = document.createElement("li");
    item.textContent = message;
    list.appendChild(item);
    count.style.display = "inline";

    Toastify({
        text: message,
        duration: 5000,
        gravity: "top",
        position: "right",
        backgroundColor: "red",
    }).showToast();
}
