<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Toast Example</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase libraries
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js';

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBr1VpHdmMZMkXQEIGp55N5JGVgYbhpyqY",
            authDomain: "medicinereminder-d0711.firebaseapp.com",
            projectId: "medicinereminder-d0711",
            storageBucket: "medicinereminder-d0711.appspot.com",
            messagingSenderId: "516386930818",
            appId: "1:516386930818:web:3d4d409673a9b4ec0bf49b"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Reference to the specific path in your Realtime Database
        const reminderRef = ref(db, 'reminders/Action');

        // Attach a listener to detect changes in that reference
        onValue(reminderRef, (snapshot) => {
            const data = snapshot.val();
            console.log(data);  // Debugging: log the data
            if (data === false) {
                showToast();
            }
        });

        // Function to show Bootstrap toast
        function showToast() {
            const toastElement = document.getElementById('myToast');
            const toast = new bootstrap.Toast(toastElement);
            toast.show();
        }
    </script>
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="myToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">Reminder</strong>
                <small>Just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                The is a reminder for you!
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
